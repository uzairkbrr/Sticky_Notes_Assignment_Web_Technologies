{% extends 'base.html' %}

{% block content %}
    <div class="auth-container">
        <!-- naye students ke liye sign up form -->
        <h2>Register</h2>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Sign Up</button>
        </form>
        <p class="auth-link">Pehle se account hai? <a href="{% url 'login' %}">Yahan login karein</a></p>
    </div>
{% endblock %}
