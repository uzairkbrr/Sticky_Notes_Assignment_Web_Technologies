{% extends 'base.html' %}

{% block content %}
    <div class="page-header">
        <h2>My Notes</h2>
    </div>
    
    <!-- yahan user ki notes display ho rahi hain -->
    <div class="note-container">
        {% for note in notes %}
            <!-- note card ban raha hai aur bg color dynamically lagaya -->
            <div class="note-card" style="background-color: {{ note.color|default:'#FFFF99' }}; color: {{ note.text_color }};">
                <h3>{{ note.title }}</h3>
                <p class="note-text">{{ note.content }}</p>
                <div class="note-actions">
                    <a href="{% url 'note_edit' note.id %}" class="btn-edit">Edit</a>
                    <a href="{% url 'note_delete' note.id %}" class="btn-delete">Delete</a>
                </div>
            </div>
        {% empty %}
            <!-- agar koi note nahi hai database main is user ka -->
            <div class="empty-state">
                <p>Aapne abhi tak koi note nahi banaya.</p>
                <a href="{% url 'note_create' %}" class="btn-create-first">Create Note</a>
            </div>
        {% endfor %}
    </div>
{% endblock %}
